<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="米国株・日本株をBear / Base / Bullの3シナリオで試算し、現在の株価位置を確認する分析ポータル">
  <meta property="og:title" content="Stock Scenario Portal">
  <meta property="og:description" content="銘柄別HTMLとmeta.jsonで運用するシナリオ試算ポータル">
  <meta property="og:type" content="website">
  <title>Stock Scenario Portal</title>
  <link rel="stylesheet" href="./lab/assets/css/site.css">
</head>
<body data-manifest-url="./data/manifest.json" data-link-prefix="">
  <header class="site-header">
    <a class="brand" href="./index.html" aria-label="トップへ">
      <span class="brand-mark">S</span>
      <span>Stock Scenario Portal</span>
    </a>
    <span class="header-badge">Scenario Dashboard</span>
  </header>

  <main>
    <section class="hero">
      <div class="hero-main">
        <p class="eyebrow">Bear / Base / Bull Valuation</p>
        <h1>株価の現在地を、<br><span>銘柄ごとに比較する。</span></h1>
        <p class="hero-copy">企業詳細とシナリオ試算をまとめた個人用ポータルです。現在値がBear/Base/Bullのどこにあるか、上値・下値のバランス、次のカタリストを一覧で確認できます。</p>
      </div>
      <div class="hero-stats" aria-label="ポータル概要">
        <div><strong id="hero-total">-</strong><span>公開中の銘柄</span></div>
        <div><strong id="hero-us">-</strong><span>米国株</span></div>
        <div><strong id="hero-jp">-</strong><span>日本株</span></div>
      </div>
    </section>

    <section class="catalog" aria-labelledby="catalog-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Published Reports</p>
          <h2 id="catalog-title">銘柄一覧</h2>
        </div>
      </div>

      <div class="tools-panel" aria-label="銘柄の検索と絞り込み">
        <label class="search-box">
          <span class="sr-only">銘柄を検索</span>
          <input id="stock-search" type="search" placeholder="銘柄名・ティッカー・テーマで検索" autocomplete="off">
        </label>
        <div class="filter-tabs" id="market-filters" aria-label="市場で絞り込み">
          <button class="filter-tab active" type="button" data-market="all">すべて</button>
          <button class="filter-tab" type="button" data-market="米国株">米国株</button>
          <button class="filter-tab" type="button" data-market="日本株">日本株</button>
        </div>
      </div>

      <p id="status" class="status" role="status">データを読み込んでいます...</p>
      <div id="stock-grid" class="stock-grid" aria-live="polite"></div>
      <noscript><p class="error-panel">このページの表示にはJavaScriptが必要です。</p></noscript>
    </section>
  </main>

  <footer>
    <span>Stock Scenario Portal</span>
    <span>掲載内容は投資助言ではありません</span>
  </footer>
  <script src="./lab/assets/js/portal.js" defer></script>
</body>
</html>
